<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masonryレイアウト — @chenglou/pretext</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <nav class="demo-nav">
    <a href="./">&larr; デモ一覧</a>
    <span class="demo-nav-title">Masonryレイアウト</span>
  </nav>
  <section class="section">
    <div class="section-header">
      <h2>Masonryレイアウト</h2>
      <p class="section-desc">DOMに触れずにカード高さを予測。リサイズしてみてください。</p>
    </div>
    <pre class="code-block"><code class="language-javascript">import { prepare, layout } from "@chenglou/pretext"

// カードの高さをDOMなしで予測
const prepared = prepare(text, '14px "Noto Sans JP"')
const { height } = layout(prepared, cardWidth, 24)
// → この height でMasonryの配置を計算</code></pre>
    <div class="masonry-controls">
      <label>カラム数: <input type="range" id="col-slider" min="2" max="6" value="4"><span id="col-count">4</span></label>
    </div>
    <div class="masonry-container" id="masonry-container"></div>
  </section>
  <script type="module" src="/masonry.js"></script>
</body>
</html>
