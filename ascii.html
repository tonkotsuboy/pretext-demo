<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>タイポグラフィックASCIIアート — @chenglou/pretext</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500;700;900&family=Noto+Serif+JP:wght@300;500;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #05050a;
      --text: #e8e8f0;
      --dim: #555568;
      --accent: #6366f1;
      --accent2: #a78bfa;
      --mono: "IBM Plex Mono", monospace;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      overflow: hidden;
      height: 100vh;
    }
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: rgba(5, 5, 10, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(99, 102, 241, 0.15);
      font-size: 12px;
    }
    .top-bar a {
      color: var(--accent2);
      text-decoration: none;
    }
    .top-bar a:hover { text-decoration: underline; }
    .top-bar .title { color: var(--accent2); letter-spacing: 0.1em; }
    .top-bar .info { color: var(--dim); }

    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      height: 100vh;
      padding-top: 44px;
    }
    .panel {
      position: relative;
      overflow: hidden;
      border-right: 1px solid rgba(99, 102, 241, 0.1);
    }
    .panel:last-child { border-right: none; }
    .panel-label {
      position: absolute;
      top: 12px;
      left: 16px;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--dim);
      z-index: 2;
    }
    #source-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    #proportional-output, #monospace-output {
      padding: 32px 12px 12px;
      line-height: 15px;
      font-size: 12px;
      white-space: pre;
      overflow: hidden;
      height: 100%;
    }
    #proportional-output {
      font-family: "Noto Serif JP", serif;
    }
    #monospace-output {
      font-family: var(--mono);
      color: var(--dim);
    }
    /* Weight & style classes */
    .w3 { font-weight: 300; }
    .w5 { font-weight: 500; }
    .w7 { font-weight: 700; }
    .w9 { font-weight: 900; }
    .a1 { opacity: 0.1; }
    .a2 { opacity: 0.2; }
    .a3 { opacity: 0.3; }
    .a4 { opacity: 0.4; }
    .a5 { opacity: 0.5; }
    .a6 { opacity: 0.6; }
    .a7 { opacity: 0.7; }
    .a8 { opacity: 0.8; }
    .a9 { opacity: 0.9; }
    .a10 { opacity: 1.0; }

    @media (max-width: 900px) {
      .panels { grid-template-columns: 1fr 1fr; }
      .panel:first-child { display: none; }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <a href="./">&larr; 戻る</a>
    <span class="title">タイポグラフィックASCIIアート</span>
    <span class="info" id="fps-counter">-- fps</span>
  </div>
  <div class="panels">
    <div class="panel">
      <span class="panel-label">SOURCE FIELD</span>
      <canvas id="source-canvas"></canvas>
    </div>
    <div class="panel">
      <span class="panel-label">PROPORTIONAL (Noto Serif JP)</span>
      <div id="proportional-output"></div>
    </div>
    <div class="panel">
      <span class="panel-label">MONOSPACE</span>
      <div id="monospace-output"></div>
    </div>
  </div>
  <script type="module" src="/ascii.js"></script>
</body>
</html>
